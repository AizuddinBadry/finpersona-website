<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate PWA Icons</title>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const sizes = [72, 96, 128, 144, 152, 180, 192, 384, 512];
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        sizes.forEach(size => {
            canvas.width = size;
            canvas.height = size;
            
            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#22C55E'); // primary color
            gradient.addColorStop(1, '#3B82F6'); // secondary blue
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Draw letter F
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${size * 0.6}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('F', size / 2, size / 2);
            
            // Download
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = size === 180 ? 'apple-touch-icon.png' : `icon-${size}x${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });
        });
        
        document.body.innerHTML = '<h1>Icons generated! Check your downloads folder.</h1>';
    </script>
</body>
</html>
